[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jaxsparrow"
version = "0.1.0"
description = "JAX - Sensitivity for PARametric Optimization (Wow!)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Riccardo Zuliani" },
]
keywords = ["jax", "optimization", "qp", "sensitivity", "mpc", "autodiff"]
dependencies = [
    "jax>=0.4",
    "jaxlib>=0.4",
    "numpy>=1.24",
    "scipy>=1.10",
    "qpsolvers>=4.0",
    "jaxtyping>=0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
osqp = ["osqp>=0.6"]
clarabel = ["clarabel>=0.6"]

[project.urls]
Homepage = "https://github.com/RiccardoZuliani98/jaxsparrow"
Repository = "https://github.com/RiccardoZuliani98/jaxsparrow"
Issues = "https://github.com/RiccardoZuliani98/jaxsparrow/issues"

# ── Hatch build config ──────────────────────────────────────────────
[tool.hatch.build.targets.wheel]
packages = ["jaxsparrow"]

# ── Pytest ───────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"